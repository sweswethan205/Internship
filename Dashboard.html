<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <section class="bg-red-300 p-6 grid  gap-8 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4">
        <div class="bg-white rounded-md p-4">
            <p>👌</p>
            <h1 class="font-bold">24k</h1>
            <h1 class="text-gray-600">PageView</h1>
            
        </div>
        <div class="bg-white rounded-md p-4">
            <p>😘</p>
            <h1 class="font-bold">895</h1>
            <h1 class="text-gray-600">Revenue</h1>

        </div>
        <div class="bg-white rounded-md p-4">
            <p>😊</p>
            <h1 class="font-bold">1.2k</h1>
            <h1 class="text-gray-600">New Users</h1>
        </div>
        <div class="bg-white rounded-md p-4">
            <p>⭐</p>
            <h1 class="font-bold">4.8</h1>
            <h1 class="text-gray-600">Rating</h1>
        </div>
    </section>
    


</body>
</html>
