<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border:1px solid rgb(204, 111, 111);
            border-collapse: collapse;
            margin:auto;
            width: 600px;
            height: 250px;
        }
        th{
            background-color: aqua;
        }
        .control{
            text-align: right;
            background-color: burlywood;
        }
        .container{
            text-align: center;
            background-color: blanchedalmond;
        }  
    </style>
</head>
<body>
    <table border="1">
        <tr >
          <th rowspan="2">No</th>
          <th rowspan="2">Student Name</th>
          <th rowspan="2">Gender</th>
          <th rowspan="2">Roll No.</th>
          <th colspan="3" >Marks</th>
        </tr>
        <tr>
            <th>Myanmar</th>
            <th>English</th>
            <th>Maths</th>
        </tr>
        <tr>
            <td class="container">1</td>
            <td>Su Su</td>
            <td rowspan="2" class="container">Female</td>
            <td>5CS-32</td>
            <td class="control">60</td>
            <td class="control">75</td>
            <td class="control">86</td>
        </tr>
        <tr>
            <td class="container">2</td>
            <td>Moe Moe</td>
            <td>5CS-33</td>
            <td class="control">78</td>
            <td class="control">86</td>
            <td class="control">84</td>
        </tr>
        <tr>
            <td class="container">3</td>
            <td>Kyaw Kyaw</td>
            <td rowspan="3" class="container">Male</td>
            <td>5CS-34</td>
            <td class="control">89</td>
            <td class="control">43</td>
            <td class="control">86</td>
        </tr>
        <tr>
            <td class="container">4</td>
            <td>Mg Mg</td>
            <td>5CS-35</td>
            <td class="control">76</td>
            <td class="control">75</td>
            <td class="control">75</td>
        </tr>
        <tr>
            <td class="container">5</td>
            <td>Aung Aung</td>
            <td>5CS-36</td>
            <td class="control">87</td>
            <td class="control">75</td>
            <td class="control">86</td>
        </tr>
    </table>
</body>
</html>
