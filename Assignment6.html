<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment6</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="mx-auto max-w-md p-5 bg-blue-100 rounded-lg shadow-lg flex gap-9 mt-20">
        <div class="flex flex-col gap-4 ">
            <h2 class="font-bold text-green-500">Update Variables</h2>
            <label for="name" class="font-bold">Name(String):</label>
            <input type="text" id="name" value="Alex Walker" class="rounded p-2 " placeholder="Enter name" oninput="updateCard()"></input>

            <label for="age" class="font-bold">Age(Number):</label>
            <input type="number" id="age" value="23" class="rounded p-2" placeholder="Enter age"oninput="updateCard()"></input>

            <label for="VIP" class="font-bold">VIP(Boolean):</label>
            <input type="checkbox" id="VIP" value="VIP" onchange="updateCard()"></input>
            
            <label for="card color" class="font-bold">Card Color:</label>
            <input type="color" id="cardcolor" value="#fecaca" onchange="updateCard()"></input>
        </div>
        <div class="rounded-lg">
            <h2 class="font-bold text-green-500 text-center">Live DOM Output</h2>
            <div id="card" class="bg-red-200 border-2 border-gray-600 rounded-lg mt-8 w-40 p-5 shadow-xl">
                <p id="outvip" class="rounded-xl bg-pink-400 w-25 text-center">VIP Status:</p>
                <p id="outname" class="font-bold">Alex Walker</p>
                <p id="outage">Age: 23</p>
            </div>
        </div>
    </div>
    <script>
        function updateCard() {
            let name = document.getElementById("name").value;
            let age = document.getElementById("age").value;
            let vip = document.getElementById("VIP").checked;
            let color = document.getElementById("cardcolor").value;
            document.getElementById("outname").innerText = name;
            document.getElementById("outage").innerText = "Age:" + age;
            if (vip) {
                document.getElementById("outvip").innerText = "VIP MEMBER";
            }
            else {
                document.getElementById("outvip").innerText = "";
            }
            document.getElementById("card").style.backgroundColor = color;
        }
    </script>
</body>

</html>
