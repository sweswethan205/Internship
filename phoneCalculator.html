<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            border: 1px solid black;
            margin: auto;
            background-color: red;
            width: 500px;
            height: 300px;
            
        }
        button{
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .buttons{
            display: grid;
            grid-template-columns: repeat(4, 1rf);
            gap: 10px;
            justify-content: center;

        }
    </style>

</head>
<body>
    <div class="container">
        <input type="text" id="output" value="0">
        </input>
        <div class="buttons">
            <button onclick="allClear()" style="color:red">C</button>
            <button onclick="deleteLast('⌫')" style="color:red">⌫</button>
            <button onclick="addValue('%')" id="color">%</button>
            <button onclick="addValue('/')" style="color:red">÷</button>

            <button onclick="addValue(7)" id="color">7</button>
            <button onclick="addValue(8)" id="color">8</button>
            <button onclick="addValue(9)" id="color">9</button>
            <button onclick="addValue('*') " style="color:red">×</button>

            <button onclick="addValue(4)" id="color">4</button>
            <button onclick="addValue(5)" id="color">5</button>
            <button onclick="addValue(6)" id="color">6</button>
            <button onclick="addValue('-')" style="color:red">-</button>

            <button onclick="addValue(1)" id="color">1</button>
            <button onclick="addValue(2)" id="color">2</button>
            <button onclick="addValue(3)" id="color">3</button>
            <button onclick="addValue('+')" style="color:red">+</button>

            <button onclick="addValue('(')" id="color">(</button>
            <button onclick="addValue(')')" id="color">)</button>
            <button onclick="addValue(0)" id="color">0</button>
            <button onclick="addValue('.')" id="color">.</button>
            <button onclick="showAnswer()" style="background-color: red;">=</button>
        </div>
    </div>
</body>
</html>
