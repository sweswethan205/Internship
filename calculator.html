<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            border: 1px solid black;
            border-radius: 10px;
            margin: auto;
            margin-top: 100px;
            /* display: flex; */
            justify-content: center;
            width: 250px;
            height: 350px;
            padding: 10px;
            max-width: 320px;
            box-shadow: 0 2px 5px;
            background-color: rgb(239, 177, 170);
        }

        .button {

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-content: center;
            margin-left: 3px;
        }

        button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 4px 6px;
            background: rgb(223, 223, 223);
            color: rgb(208, 56, 56);
            border: none;
            font-size: 20px;
        }

        #result {
            width: 95%;
            height: 20px;
            padding: 15px 5px;
            text-align: right;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .btn1 {
            color: orangered;
            background-color: rgb(167, 167, 228);
        }

        .btn2 {
            color: skyblue;
            background-color: rgb(167, 167, 228);
        }

        .btn3 {
            color: white;
            background-color: pink;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="text" id="result" name="result" value="0">
        <div class="button">
            <button class="btn1" onclick="clearFun()">C</button>
            <button onclick="deleteFun()" class="btn1"><i class="fa-solid fa-delete-left"></i></button>
            <button onclick="getData('%')" class="btn2">%</button>
            <button onclick="getData('/')" class="btn1">/</button>
            <button onclick="getData(7)" class="btn2">7</button>
            <button onclick="getData(8)" class="btn2">8</button>
            <button onclick="getData(9)" class="btn2">9</button>
            <button onclick="getData('*')" class="btn1">*</button>
            <button onclick="getData(4)" class="btn2">4</button>
            <button onclick="getData(5)" class="btn2">5</button>
            <button onclick="getData(6)" class="btn2">6</button>
            <button onclick="getData('-')" class="btn1">-</button>
            <button onclick="getData(1)" class="btn2">1</button>
            <button onclick="getData(2)" class="btn2">2</button>
            <button onclick="getData(3)" class="btn2">3</button>
            <button onclick="getData('+')" class="btn1">+</button>
            <button onclick="getData('(')" class="btn2">(</button>
            <button onclick="getData(')')" class="btn2">)</button>
            <button onclick="getData(0)" class="btn2">0</button>
            <button onclick="getData('.')" class="btn2">.</button>
            <button onclick="calculate('=')" class="btn3">=</button>
        </div>
    </div>
    <script>
        let result = document.getElementById("result");
        function getData(data) {
            let lastChar = result.value.slice(-1); // Get the last character typed
            let operators = ["+", "-", "*", "/", "%", "."];
            // Automatically add * if a number is followed by 
            if (data === "(" && !isNaN(lastChar) && result.value !== "0") {
                result.value += "*(";
                return;
            }
            // If the last char is an operator AND the new char is an operator, STOP.
            if (operators.includes(lastChar) && operators.includes(data)) {
                return;
            }
            if (result.value === '0' && !operators.includes(data)) {
                result.value = data;
            } else {
                result.value += data;
            }
        
        }


        function calculate() {

            // 1. Automatically close missing brackets
            let open = (result.value.match(/\(/g)  []).length;
            let close = (result.value.match(/\)/g)  []).length;
            while (open > close) {
                result.value += ")";
                close++;
            }

            if (result.value.includes("()")) {
                result.value = "Error";
                return;
            }

            try {

                if (result.value.includes('/0') && !result.value.includes('/0.')) {
                    result.value = "Cannot divide by 0";
                    return;
                }
                let finalResult = eval(result.value);
                if (Number.isInteger(finalResult)) {
                    result.value = finalResult;
                } else {
                    result.value = parseFloat(finalResult.toFixed(6));
                }
            } catch (error) {
                // This catches cases like (5+) or other syntax issues
                result.value = "Syntax Error";
            }
        }

        function clearFun() {
            result.value = "0";
        }
        function deleteFun(data) {
            result.value = result.value.slice(0, -1) || "0";

        }
    </script>
</body>

</html>
